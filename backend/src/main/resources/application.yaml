server:
  port: 8080 # 스프링 서버가 뜰 포트

spring:
  config:
    import: optional:file:.env[.properties]

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:13306/rungo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update # 엔티티 변경 시 테이블 구조 자동 업데이트
    show-sql: true     # 실행되는 SQL 콘솔에 출력
    properties:
      hibernate:
        format_sql: true # SQL 가독성 좋게 정렬
        default_batch_fetch_size: 1000 # 성능 최적화 설정

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

springdoc:
  default-produces-media-type: application/json; charset=UTF-8

jwt:
  secret: ${JWT_SECRET}