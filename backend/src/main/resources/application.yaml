server:
  port: 8080 # 스프링 서버가 뜰 포트

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:13306/rungo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update # 엔티티 변경 시 테이블 구조 자동 업데이트
    show-sql: true     # 실행되는 SQL 콘솔에 출력
    properties:
      hibernate:
        format_sql: true # SQL 가독성 좋게 정렬
        default_batch_fetch_size: 1000 # 성능 최적화 설정